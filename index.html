<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iso Yawi PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #0b0f1a;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    width: 60%;
    margin: auto;
    background: #111827;
    padding: 20px;
    border-radius: 10px;
}

input, button {
    padding: 10px;
    margin: 10px;
}

button {
    background: #00ffcc;
    border: none;
    cursor: pointer;
}

#output {
    text-align: left;
    white-space: pre-wrap;
    background: #0f172a;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h2>📄 Iso Yawi PDF Converter</h2>

<input type="file" id="fileInput" accept=".docx">
<br>

<button onclick="convertFile()">Convert to PDF</button>

<button onclick="downloadPDF()">Download PDF</button>

<div id="output">Upload a Word document to preview...</div>

</div>

<script>
let extractedText = "";
let pdfDoc;

async function convertFile() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please upload a DOCX file");
        return;
    }

    const arrayBuffer = await file.arrayBuffer();

    mammoth.extractRawText({ arrayBuffer: arrayBuffer })
        .then(function(result) {
            extractedText = result.value;
            document.getElementById("output").innerText = extractedText;
        })
        .catch(function(err) {
            alert("Error reading file");
        });
}

// CREATE PDF WITH WATERMARK
function downloadPDF() {
    if (!extractedText) {
        alert("No content to convert");
        return;
    }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    const lines = pdf.splitTextToSize(extractedText, 180);

    let y = 20;

    // MAIN TEXT
    pdf.setFontSize(12);
    pdf.text(lines, 10, y);

    // WATERMARK FUNCTION
    pdf.setTextColor(200, 200, 200);
    pdf.setFontSize(30);
    pdf.setFont("helvetica", "bold");

    pdf.text(
        "Iso Yawi PDF Converter",
        20,
        150,
        { angle: 45, opacity: 0.2 }
    );

    pdf.save("Iso_Yawi_Converted.pdf");
}
</script>

</body>
</html>
